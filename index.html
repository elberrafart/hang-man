<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Plumber Hangman</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Mario Character Container -->
    <div id="mario-container">
        <div id="mario-character"></div>
    </div>

    <!-- Background Music -->
    <audio id="bg-music" loop preload="auto">
        <source src="https://www.silvermansound.com/wp-content/uploads/happynes.mp3" type="audio/mpeg">
    </audio>
    <audio id="win-music" preload="auto">
        <source src="https://opengameart.org/sites/default/files/Heavy_ConceptB.wav" type="audio/wav">
    </audio>
    <audio id="lose-music" preload="auto">
        <source src="https://opengameart.org/sites/default/files/GAMEOVER.wav" type="audio/wav">
    </audio>

    <!-- Mute Button -->
    <button id="mute-btn" class="mute-btn" title="Toggle music">🔊 Mute</button>

    <!-- Click to start - enables music (browsers block autoplay until user interacts) -->
    <div id="start-overlay" class="start-overlay">
        <span>Click anywhere to start game &amp; music</span>
    </div>

    <div class="game-wrapper">
        <h1>HangMan</h1>
        <div id="secret-word" class="guessed-letters-con"></div>

        <div id="letter-container" class="letter-container">
            <div id="A" class="letter-box">A</div>
            <div id="B" class="letter-box">B</div>
            <div id="C" class="letter-box">C</div>
            <div id="D" class="letter-box">D</div>
            <div id="E" class="letter-box">E</div>
            <div id="F" class="letter-box">F</div>
            <div id="G" class="letter-box">G</div>
            <div id="H" class="letter-box">H</div>
            <div id="I" class="letter-box">I</div>
            <div id="J" class="letter-box">J</div>
            <div id="K" class="letter-box">K</div>
            <div id="L" class="letter-box">L</div>
            <div id="M" class="letter-box">M</div>
            <div id="N" class="letter-box">N</div>
            <div id="O" class="letter-box">O</div>
            <div id="P" class="letter-box">P</div>
            <div id="Q" class="letter-box">Q</div>
            <div id="R" class="letter-box">R</div>
            <div id="S" class="letter-box">S</div>
            <div id="T" class="letter-box">T</div>
            <div id="U" class="letter-box">U</div>
            <div id="V" class="letter-box">V</div>
            <div id="W" class="letter-box">W</div>
            <div id="X" class="letter-box">X</div>
            <div id="Y" class="letter-box">Y</div>
            <div id="Z" class="letter-box">Z</div>
        </div>

        <div class="lives-section">
            <p class="lives-label">Lives</p>
            <div class="lives-container"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
